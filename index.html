<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍舟賽 互動賽程引導</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Ma+Shan+Zheng&display=swap');

:root {
  --red:      #c0392b;
  --red-l:    #e74c3c;
  --red-bg:   #fff0ef;
  --gold:     #b5800a;
  --gold-l:   #e6a817;
  --gold-bg:  #fffbf0;
  --ink:      #1a1008;
  --ink-m:    #5a4a30;
  --ink-l:    #9a8a6a;
  --paper:    #fdf8f2;
  --paper2:   #f5ede0;
  --green:    #2d6a4f;
  --green-l:  #40916c;
  --green-bg: #edf7f2;
  --border:   rgba(180,120,40,0.18);
  --shadow:   0 2px 16px rgba(90,60,20,0.09);
  --shadow-l: 0 4px 28px rgba(90,60,20,0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  overflow-x: hidden;
  /* subtle paper texture */
  background-image:
    url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
}

/* ── CHINESE PATTERN BORDERS ── */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; height: 6px;
  background: repeating-linear-gradient(90deg, var(--red) 0, var(--red) 12px, var(--gold-l) 12px, var(--gold-l) 24px, #fff 24px, #fff 28px);
  z-index: 100;
}
body::after {
  content: '';
  position: fixed; bottom: 0; left: 0; right: 0; height: 6px;
  background: repeating-linear-gradient(90deg, var(--red) 0, var(--red) 12px, var(--gold-l) 12px, var(--gold-l) 24px, #fff 24px, #fff 28px);
  z-index: 100;
}

/* ── SIDE DECO ── */
.side-deco {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 32px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  pointer-events: none; z-index: 0; opacity: 0.18;
}
.side-deco.left { left: 8px; }
.side-deco.right { right: 8px; }
.side-deco span { font-size: 1.1rem; writing-mode: vertical-rl; color: var(--red); }

/* ── HEADER ── */
header {
  background: #fff;
  border-bottom: 2px solid var(--border);
  padding: 28px 20px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
/* cloud pattern behind header */
header::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse 120px 60px at 10% 60%, rgba(192,57,43,0.04) 0%, transparent 100%),
    radial-gradient(ellipse 100px 50px at 90% 40%, rgba(181,128,10,0.06) 0%, transparent 100%);
  pointer-events: none;
}

.header-ornament {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 10px;
}
.ornament-line {
  height: 1px; flex: 1; max-width: 100px;
  background: linear-gradient(90deg, transparent, var(--gold-l), transparent);
}
.ornament-diamond {
  width: 8px; height: 8px;
  background: var(--red);
  transform: rotate(45deg);
  flex-shrink: 0;
}

h1 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(1.7rem, 5vw, 2.8rem);
  color: var(--red);
  letter-spacing: 0.1em;
  line-height: 1.2;
  position: relative;
}
.h1-sub {
  font-size: 0.72rem;
  color: var(--ink-l);
  letter-spacing: 0.2em;
  margin-top: 4px;
}

/* ── TEAM TABS ── */
.team-tabs {
  display: flex; gap: 10px; justify-content: center;
  margin-top: 18px;
}
.team-btn {
  background: var(--paper2);
  border: 1.5px solid var(--border);
  color: var(--ink-m);
  border-radius: 4px;
  padding: 8px 20px;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.22s;
  letter-spacing: 0.04em;
  position: relative;
  overflow: hidden;
}
.team-btn::after {
  content: '';
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 0; height: 2px;
  background: var(--red);
  transition: width 0.22s;
}
.team-btn:hover { background: #fff; color: var(--red); border-color: var(--red); }
.team-btn.active {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
  box-shadow: 0 2px 12px rgba(192,57,43,0.22);
}
.team-btn.active::after { width: 0; }

/* ── MAIN ── */
main {
  max-width: 600px; margin: 0 auto;
  padding: 28px 16px 80px;
  position: relative; z-index: 1;
}

/* ── BREADCRUMB ── */
.breadcrumb {
  display: flex; flex-wrap: wrap; align-items: center; gap: 5px;
  margin-bottom: 20px; min-height: 24px;
}
.crumb {
  font-size: 0.7rem; color: var(--ink-l);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 2px 8px;
  letter-spacing: 0.04em;
}
.crumb.current { color: var(--red); border-color: rgba(192,57,43,0.3); background: var(--red-bg); }
.crumb-arrow { color: var(--ink-l); font-size: 0.65rem; }

/* ── MATCH CARD ── */
.match-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 0;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: fadeUp 0.35s cubic-bezier(0.4,0,0.2,1) both;
  position: relative;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* red left accent bar */
.match-card::before {
  content: '';
  position: absolute; top: 0; left: 0; bottom: 0; width: 5px;
  background: var(--red);
}
.match-card.repechage::before { background: linear-gradient(180deg, var(--red), var(--gold-l)); }
.match-card.start-style::before { background: var(--green-l); }
.match-card.final-style::before { background: linear-gradient(180deg, var(--gold-l), var(--red)); }

.card-inner { padding: 20px 20px 18px 22px; }

.card-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 12px;
}
.card-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.06em;
  border-radius: 3px;
  padding: 3px 9px;
}
.badge-start  { background: var(--green-bg); color: var(--green); border: 1px solid rgba(45,106,79,0.2); }
.badge-rep    { background: #fff5f0; color: #c0392b; border: 1px solid rgba(192,57,43,0.25); }
.badge-normal { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(181,128,10,0.2); }
.badge-final  { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(181,128,10,0.35); }

.card-num-label { font-size: 0.72rem; color: var(--ink-l); letter-spacing: 0.08em; }

.card-datetime {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 4px;
}
.card-date { font-size: 0.9rem; color: var(--ink-m); }
.card-time {
  font-size: 2rem; font-weight: 900;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.02em;
}
.card-num { font-size: 0.82rem; color: var(--ink-m); margin-bottom: 6px; font-weight: 600; }
.card-note { font-size: 0.78rem; color: var(--ink-l); line-height: 1.6; }

/* chinese cloud decoration in card */
.card-cloud {
  position: absolute; right: 14px; bottom: 10px;
  opacity: 0.06; font-size: 3.5rem; line-height: 1;
  pointer-events: none; user-select: none;
  color: var(--red);
}

.warning-box {
  margin: 12px 0 0;
  background: #fff5f0;
  border: 1px solid rgba(192,57,43,0.2);
  border-radius: 5px;
  padding: 9px 12px;
  font-size: 0.76rem;
  color: var(--red-l);
  display: flex; gap: 7px;
  line-height: 1.5;
}

/* ── QUESTION ── */
.question {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.92rem; font-weight: 700;
  color: var(--ink);
  margin: 16px 0 10px;
  letter-spacing: 0.02em;
}
.question::before, .question::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}
.question::after { background: linear-gradient(270deg, var(--border), transparent); }

/* ── CHOICES ── */
.choices { display: flex; flex-direction: column; gap: 8px; }

.choice-btn {
  display: flex; align-items: center; gap: 14px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 13px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: 'Noto Serif TC', serif;
  color: var(--ink);
  width: 100%;
  box-shadow: 0 1px 6px rgba(90,60,20,0.05);
}
.choice-btn:hover:not(.rank-elim) {
  border-color: var(--red);
  box-shadow: 0 2px 14px rgba(192,57,43,0.12);
  transform: translateX(3px);
}
.choice-btn.rank-elim {
  opacity: 0.45; cursor: not-allowed;
  background: var(--paper2);
}
.choice-btn.rank-elim:hover { transform: none; border-color: var(--border); box-shadow: none; }

.rank-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 900;
  flex-shrink: 0;
  font-family: 'Noto Serif TC', serif;
}
.icon-1 { background: var(--gold-l); color: #fff; }
.icon-2 { background: #b0b8c1; color: #fff; }
.icon-3 { background: #cd7f32; color: #fff; }
.icon-4 { background: var(--red); color: #fff; }
.icon-x { background: #ddd; color: #999; }

.choice-info { flex: 1; }
.choice-rank { font-size: 0.92rem; font-weight: 700; color: var(--ink); }
.choice-next { font-size: 0.72rem; color: var(--ink-l); margin-top: 2px; }
.choice-arrow { color: var(--ink-l); font-size: 0.9rem; flex-shrink: 0; transition: transform 0.2s; }
.choice-btn:hover:not(.rank-elim) .choice-arrow { color: var(--red); transform: translateX(2px); }

/* ── SPECIAL SCREENS ── */
.elim-card, .final-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 36px 24px;
  text-align: center;
  box-shadow: var(--shadow-l);
  animation: fadeUp 0.35s ease both;
  position: relative; overflow: hidden;
}
.elim-card { border-color: rgba(192,57,43,0.25); }
.final-card { border-color: rgba(181,128,10,0.4); }

.elim-card::before { background: var(--red); }
.final-card::before { background: linear-gradient(180deg, var(--gold-l), var(--red)); }
.elim-card::before, .final-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
}

.screen-icon { font-size: 2.8rem; margin-bottom: 12px; display: block; }
.screen-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 1.9rem;
  margin-bottom: 8px;
}
.elim-card .screen-title { color: var(--red); }
.final-card .screen-title { color: var(--gold); }
.screen-text { font-size: 0.82rem; color: var(--ink-l); line-height: 1.8; }

/* chinese knot / window pattern decoration */
.window-pattern {
  position: absolute; right: 14px; bottom: 10px;
  opacity: 0.05; font-size: 4rem;
  pointer-events: none; color: var(--red);
}

/* ── HISTORY ── */
.history-section { margin-top: 22px; }
.history-head {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.72rem; color: var(--ink-l);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.history-head::before, .history-head::after {
  content: ''; flex: 1; height: 1px;
  background: var(--border);
}
.history-list { display: flex; flex-direction: column; gap: 5px; }
.history-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 7px 12px;
  font-size: 0.76rem;
}
.history-rank { font-size: 0.9rem; width: 20px; text-align: center; }
.history-info { flex: 1; color: var(--ink-m); }
.history-match { font-weight: 700; color: var(--ink); margin-right: 5px; }

/* ── RESET ── */
.reset-btn {
  display: block; margin: 18px auto 0;
  background: var(--paper2);
  border: 1.5px solid var(--border);
  color: var(--ink-m);
  border-radius: 5px;
  padding: 9px 26px;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.reset-btn:hover { background: #fff; border-color: var(--red); color: var(--red); }

/* ── DIVIDER SVG ── */
.chinese-divider {
  display: flex; align-items: center; justify-content: center;
  margin: 4px 0 8px;
  gap: 6px;
  opacity: 0.3;
}
.chinese-divider .d-line { flex: 1; height: 1px; background: var(--gold-l); }
.chinese-divider .d-sym { font-size: 0.85rem; color: var(--red); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--paper2); }
::-webkit-scrollbar-thumb { background: rgba(181,128,10,0.3); border-radius: 2px; }

<main>

    app.innerHTML = `
      <div class="elim-card">
        <div class="window-pattern">卍</div>
        <span class="screen-icon">🏳️</span>
        <div class="screen-title">已淘汰出局</div>
        <div class="screen-text">
          敗部復活賽再次得第四名<br>本屆賽程就此結束<br>感謝 ${TEAMS[currentTeam].name} 的全力拼搏！
        </div>
        ${renderHistory()}
        <button class="reset-btn" onclick="restart()">↩ 重新開始</button>
      </div>`;
    return;
  }

  const node = getNode(currentNodeId);
  if (!node) return;

  if (node.isFinal) {
    app.innerHTML = `
      <div class="final-card">
        <div class="window-pattern">囍</div>
        <span class="screen-icon">🏆</span>
        <div class="screen-title">殺進決賽！</div>
        <div class="screen-text">
          ${node.date}&ensp;${node.time}&ensp;${node.num}<br><br>
          ${node.note || ''}<br>全力以赴，奪取冠軍！🥇
        </div>
        ${renderHistory()}
        <button class="reset-btn" onclick="restart()">↩ 重新開始</button>
      </div>`;
    return;
  }

  const badgeCls  = node.isStart ? 'badge-start' : node.isRepechage ? 'badge-rep' : node.isFinal ? 'badge-final' : 'badge-normal';
  const badgeTxt  = node.isStart ? '🚀 起點場次' : node.isRepechage ? '⚡ 敗部復活賽' : node.isFinal ? '🏆 決賽' : '▸ ' + node.label;
  const cardCls   = node.isStart ? 'start-style' : node.isRepechage ? 'repechage' : node.isFinal ? 'final-style' : '';
  const cloudChar = node.isRepechage ? '龍' : node.isStart ? '舟' : '賽';

  const choicesHtml = node.choices.map(c => {
    const btnCls  = c.isElim ? 'rank-elim' : `rank-${c.rank}`;
    const nextNode = (c.next && c.next !== 'ELIM') ? getNode(c.next) : null;
    const nextTxt  = c.isElim
      ? '本屆賽程結束'
      : nextNode ? `下一場：${nextNode.num}（${nextNode.date} ${nextNode.time}）` : '';
    const onClick  = c.isElim ? `eliminate()` : `goTo('${c.next}')`;
    return `
      <button class="choice-btn ${btnCls}" onclick="${onClick}">
        <div class="rank-icon icon-${c.isElim ? 'x' : c.icon}">${c.rank}</div>
        <div class="choice-info">
          <div class="choice-rank">${c.label}</div>
          <div class="choice-next">${nextTxt}</div>
        </div>
        <div class="choice-arrow">${c.isElim ? '✕' : '›'}</div>
      </button>`;
  }).join('');

  app.innerHTML = `
    <div class="match-card ${cardCls}">
      <div class="card-inner">
        <div class="card-top">
          <span class="card-badge ${badgeCls}">${badgeTxt}</span>
          <span class="card-num-label">${node.num}</span>
        </div>
        <div class="card-datetime">
          <span class="card-date">${node.date}</span>
          <span class="card-time">${node.time}</span>
        </div>
        <div class="card-num">${node.label}</div>
        ${node.note ? `<div class="card-note">${node.note}</div>` : ''}
        ${node.isRepechage ? `<div class="warning-box">⚠ 敗部復活賽：此場若得第四名即淘汰出局，無法繼續比賽！</div>` : ''}
      </div>
      <div class="card-cloud">${cloudChar}</div>
    </div>

    <div class="chinese-divider">
      <div class="d-line"></div>
      <span class="d-sym">✦</span>
      <span class="d-sym" style="font-size:0.7rem;color:var(--ink-l)">比完後選擇名次</span>
      <span class="d-sym">✦</span>
      <div class="d-line"></div>
    </div>

    <div class="choices">${choicesHtml}</div>
    ${history.length > 0 ? renderHistory() : ''}
    ${history.length > 0 ? `<button class="reset-btn" onclick="restart()">↩ 重新開始</button>` : ''}
  `;
}

function renderHistory() {
  if (!history.length) return '';
  const em = {1:'🥇',2:'🥈',3:'🥉',4:'💀'};
  const items = history.map(h => `
    <div class="history-item">
      <div class="history-rank">${em[h.rank]||'·'}</div>
      <div class="history-info">
        <span class="history-match">${h.num}</span>${h.date} ${h.time} — 第${h.rank}名
      </div>
    </div>`).join('');
  return `
    <div class="history-section">
      <div class="history-head">歷史記錄</div>
      <div class="history-list">${items}</div>
    </div>`;
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (!history.length) { bc.innerHTML=''; return; }
  bc.innerHTML = history.map((h,i) =>
    `<span class="crumb ${i===history.length-1?'current':''}">${h.num}</span>${i<history.length-1?'<span class="crumb-arrow">›</span>':''}`
  ).join('');
}

/* ── ACTIONS ── */
function goTo(nextId) {
  const node = getNode(currentNodeId);
  if (node) {
    const c = node.choices.find(x => x.next === nextId);
    if (c) history.push({num:node.num, date:node.date, time:node.time, rank:c.rank});
  }
  currentNodeId = nextId;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function eliminate() {
  const node = getNode(currentNodeId);
  if (node) history.push({num:node.num, date:node.date, time:node.time, rank:4});
  currentNodeId = 'ELIM';
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function restart() {
  history = [];
  currentNodeId = TEAMS[currentTeam].start;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function selectTeam(team) {
  currentTeam = team;
  history = [];
  currentNodeId = TEAMS[team].start;
  document.getElementById('btn-long').classList.toggle('active', team==='long');
  document.getElementById('btn-guard').classList.toggle('active', team==='guard');
  render();
}

selectTeam('long');
</script>
</body>
</html>
