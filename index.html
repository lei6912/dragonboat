<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍舟賽 互動賽程引導</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Ma+Shan+Zheng&display=swap');

:root {
  --gold: #f0a500;
  --gold2: #ffd166;
  --red: #c0392b;
  --red2: #e74c3c;
  --green: #27ae60;
  --bg: #0b1a2e;
  --bg2: #0f2540;
  --panel: rgba(255,255,255,0.05);
  --border: rgba(240,165,0,0.25);
  --text: #f0e6d0;
  --muted: rgba(240,230,208,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(240,165,0,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(41,128,185,0.1) 0%, transparent 60%);
}

/* WAVES */
.wave-svg {
  position: fixed; left: 0; right: 0; pointer-events: none; z-index: 0;
}
.wave-svg.top { top: 0; }
.wave-svg.bottom { bottom: 0; transform: scaleY(-1); }

/* PARTICLES */
.particle {
  position: fixed; pointer-events: none; z-index: 0;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--gold);
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* HEADER */
header {
  position: relative; z-index: 2;
  text-align: center;
  padding: 32px 20px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(240,165,0,0.06) 0%, transparent 100%);
}
.team-tabs {
  display: flex; gap: 10px; justify-content: center; margin-bottom: 18px;
}
.team-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 30px;
  padding: 8px 22px;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
}
.team-btn:hover { border-color: var(--gold); color: var(--gold2); }
.team-btn.active {
  background: linear-gradient(135deg, rgba(240,165,0,0.2), rgba(192,57,43,0.15));
  border-color: var(--gold);
  color: var(--gold);
  box-shadow: 0 0 20px rgba(240,165,0,0.15);
}
h1 {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  color: var(--gold);
  text-shadow: 0 0 40px rgba(240,165,0,0.4);
  letter-spacing: 0.08em;
}
.subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.1em; }

/* MAIN AREA */
main {
  position: relative; z-index: 2;
  max-width: 680px; margin: 0 auto;
  padding: 28px 16px 80px;
}

/* BREADCRUMB */
.breadcrumb {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  margin-bottom: 20px;
  min-height: 28px;
}
.crumb {
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 3px 10px;
  white-space: nowrap;
}
.crumb.current { color: var(--gold); border-color: rgba(240,165,0,0.4); }
.crumb-arrow { color: var(--muted); font-size: 0.7rem; }

/* MATCH CARD */
.match-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 22px;
  margin-bottom: 18px;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
  animation: slideIn 0.4s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.match-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--red));
}
.match-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.72rem; color: var(--muted);
  background: rgba(255,255,255,0.05);
  border-radius: 10px; padding: 3px 10px;
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}
.match-datetime {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 6px;
}
.match-date { font-size: 1rem; color: var(--muted); }
.match-time {
  font-size: 2.2rem; font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(240,165,0,0.3);
  line-height: 1;
}
.match-num {
  font-size: 1rem; color: var(--text);
  margin-bottom: 4px;
}
.match-note {
  font-size: 0.78rem; color: var(--muted);
  line-height: 1.6;
}

/* START BADGE */
.badge-start {
  display: inline-block;
  background: linear-gradient(135deg, var(--green), #1e8449);
  color: #fff;
  border-radius: 8px;
  padding: 3px 12px;
  font-size: 0.72rem;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}
.badge-final {
  display: inline-block;
  background: linear-gradient(135deg, var(--gold), #c87000);
  color: var(--bg);
  border-radius: 8px;
  padding: 3px 12px;
  font-size: 0.72rem;
  font-weight: 900;
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}
.badge-repechage {
  display: inline-block;
  background: rgba(231,76,60,0.2);
  border: 1px solid rgba(231,76,60,0.4);
  color: #e74c3c;
  border-radius: 8px;
  padding: 3px 12px;
  font-size: 0.72rem;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 0.05em;
}
.warning-box {
  background: rgba(192,57,43,0.12);
  border: 1px solid rgba(192,57,43,0.35);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.8rem;
  color: #e08070;
  margin-top: 14px;
  display: flex; gap: 8px; align-items: flex-start;
  line-height: 1.5;
}

/* QUESTION */
.question {
  font-size: 1rem; font-weight: 700;
  color: var(--text);
  margin: 18px 0 12px;
  letter-spacing: 0.03em;
}

/* CHOICE BUTTONS */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  display: flex; align-items: center; gap: 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  font-family: 'Noto Serif TC', serif;
  color: var(--text);
  width: 100%;
  position: relative;
  overflow: hidden;
}
.choice-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(240,165,0,0.08) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}
.choice-btn:hover::after { opacity: 1; }
.choice-btn:hover { border-color: rgba(240,165,0,0.5); transform: translateX(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }

.choice-btn.rank-1:hover { border-color: rgba(240,165,0,0.7); }
.choice-btn.rank-2:hover { border-color: rgba(192,192,192,0.6); }
.choice-btn.rank-3:hover { border-color: rgba(205,127,50,0.6); }
.choice-btn.rank-4:hover { border-color: rgba(231,76,60,0.6); }
.choice-btn.rank-elim { opacity: 0.5; cursor: not-allowed; }
.choice-btn.rank-elim:hover { transform: none; border-color: var(--border); }

.rank-icon {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 900;
  flex-shrink: 0;
}
.icon-1 { background: linear-gradient(135deg, #f0a500, #ffd166); color: var(--bg); }
.icon-2 { background: linear-gradient(135deg, #bdc3c7, #95a5a6); color: var(--bg); }
.icon-3 { background: linear-gradient(135deg, #cd7f32, #a04000); color: #fff; }
.icon-4 { background: linear-gradient(135deg, #c0392b, #922b21); color: #fff; }
.icon-x { background: rgba(50,50,50,0.5); color: #555; }

.choice-info { flex: 1; }
.choice-rank { font-size: 0.95rem; font-weight: 700; }
.choice-next { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
.choice-arrow { color: var(--gold); font-size: 1rem; flex-shrink: 0; }

/* ELIMINATED */
.eliminated-card {
  background: rgba(192,57,43,0.08);
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: 16px;
  padding: 32px 22px;
  text-align: center;
  animation: slideIn 0.4s ease both;
}
.elim-icon { font-size: 3rem; margin-bottom: 12px; }
.elim-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.8rem; color: #e74c3c; margin-bottom: 8px; }
.elim-text { font-size: 0.85rem; color: var(--muted); line-height: 1.7; }

/* FINAL CARD */
.final-celebration {
  background: linear-gradient(135deg, rgba(240,165,0,0.12), rgba(192,57,43,0.1));
  border: 1px solid rgba(240,165,0,0.5);
  border-radius: 16px;
  padding: 32px 22px;
  text-align: center;
  animation: slideIn 0.4s ease both;
  box-shadow: 0 0 40px rgba(240,165,0,0.1);
}
.final-icon { font-size: 3rem; margin-bottom: 12px; animation: pulse 1s ease infinite alternate; }
@keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
.final-title { font-family: 'Ma Shan Zheng', cursive; font-size: 2rem; color: var(--gold); margin-bottom: 8px; text-shadow: 0 0 20px rgba(240,165,0,0.5); }

/* RESET BTN */
.reset-btn {
  display: block; margin: 20px auto 0;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 10px;
  padding: 10px 28px;
  font-family: 'Noto Serif TC', serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.reset-btn:hover { border-color: var(--gold); color: var(--gold); }

/* HISTORY */
.history-section { margin-top: 24px; }
.history-title {
  font-size: 0.75rem; color: var(--muted);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.history-list { display: flex; flex-direction: column; gap: 6px; }
.history-item {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.78rem;
}
.history-rank { font-size: 0.85rem; }
.history-info { flex: 1; color: var(--muted); }
.history-match { color: var(--text); font-weight: 600; margin-right: 6px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(240,165,0,0.2); border-radius: 2px; }
</style>
</head>

// ============================================================
//  STATE
// ============================================================
let currentTeam = 'long';
let currentNodeId = null;
let history = [];

function getNode(id) {
  return TEAMS[currentTeam].nodes[id];
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  renderBreadcrumb();
  const app = document.getElementById('app');

  if (currentNodeId === 'ELIM') {
    app.innerHTML = `
      <div class="eliminated-card">
        <div class="elim-icon">🏳️</div>
        <div class="elim-title">已淘汰出局</div>
        <div class="elim-text">敗部復活賽再次得第四名，本屆賽程結束。<br>感謝${TEAMS[currentTeam].name}的拼搏！下次再戰！</div>
      </div>
      ${renderHistory()}
      <button class="reset-btn" onclick="restart()">↩ 重新開始</button>
    `;
    return;
  }

  const node = getNode(currentNodeId);
  if (!node) return;

  if (node.isFinal) {
    app.innerHTML = `
      <div class="final-celebration">
        <div class="final-icon">🏆</div>
        <div class="final-title">殺進決賽！</div>
        <div style="font-size:1rem;color:var(--gold2);margin-bottom:6px">${node.date} ${node.time}｜${node.num}</div>
        <div style="font-size:0.85rem;color:var(--muted);line-height:1.7">${node.note || ''}<br>全力以赴，奪取冠軍！🥇</div>
      </div>
      ${renderHistory()}
      <button class="reset-btn" onclick="restart()">↩ 重新開始</button>
    `;
    return;
  }

  // Normal node
  const isRep = node.isRepechage;
  const badgeHtml = node.isStart
    ? `<div class="badge-start">START</div>`
    : isRep
      ? `<div class="badge-repechage">⚡ 敗部復活賽</div>`
      : '';

  const choicesHtml = node.choices.map(c => {
    const iconClass = c.isElim ? 'icon-x' : `icon-${c.icon}`;
    const btnClass = c.isElim ? 'rank-elim' : `rank-${c.rank}`;
    const nextNode = c.next === 'ELIM' ? null : getNode(c.next);
    const nextLabel = c.next === 'ELIM'
      ? '❌ 賽程結束'
      : nextNode
        ? `→ ${nextNode.num}（${nextNode.date} ${nextNode.time}）`
        : '';
    return `
      <button class="choice-btn ${btnClass}" onclick="${c.isElim ? `eliminate()` : `goTo('${c.next}')`}">
        <div class="rank-icon ${iconClass}">${c.rank === 1 || c.rank === 2 ? c.rank : c.rank}</div>
        <div class="choice-info">
          <div class="choice-rank">${c.label}</div>
          <div class="choice-next">${nextLabel}</div>
        </div>
        <div class="choice-arrow">${c.isElim ? '💀' : '›'}</div>
      </button>
    `;
  }).join('');

  app.innerHTML = `
    <div class="match-card">
      ${badgeHtml}
      <div class="match-tag">${node.label}</div>
      <div class="match-datetime">
        <div class="match-date">${node.date}</div>
        <div class="match-time">${node.time}</div>
      </div>
      <div class="match-num">${node.num}</div>
      ${node.note ? `<div class="match-note">${node.note}</div>` : ''}
      ${isRep ? `<div class="warning-box">⚠️ 敗部復活賽：此場若得第四名即淘汰出局，無法繼續比賽！</div>` : ''}
    </div>

    <div class="question">比完 ${node.num}，你們得了第幾名？</div>
    <div class="choices">${choicesHtml}</div>

    ${history.length > 0 ? renderHistory() : ''}
    ${history.length > 0 ? `<button class="reset-btn" onclick="restart()">↩ 重新開始</button>` : ''}
  `;
}

function renderHistory() {
  if (history.length === 0) return '';
  const rankEmoji = { 1:'🥇', 2:'🥈', 3:'🥉', 4:'💀' };
  const items = history.map(h => `
    <div class="history-item">
      <div class="history-rank">${rankEmoji[h.rank] || '•'}</div>
      <div class="history-info">
        <span class="history-match">${h.num}</span>${h.date} ${h.time} — 第${h.rank}名
      </div>
    </div>
  `).join('');
  return `
    <div class="history-section">
      <div class="history-title">▸ 歷史記錄</div>
      <div class="history-list">${items}</div>
    </div>
  `;
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (history.length === 0) { bc.innerHTML = ''; return; }
  const crumbs = history.map((h, i) => {
    const isLast = i === history.length - 1;
    return `<span class="crumb ${isLast ? 'current' : ''}">${h.num}</span>${isLast ? '' : '<span class="crumb-arrow">›</span>'}`;
  }).join('');
  bc.innerHTML = crumbs;
}

// ============================================================
//  ACTIONS
// ============================================================
function goTo(nextId) {
  const node = getNode(currentNodeId);
  if (!node) return;
  // Find which choice was made
  const chosen = node.choices.find(c => c.next === nextId);
  if (chosen && !chosen.isElim) {
    history.push({ num: node.num, date: node.date, time: node.time, rank: chosen.rank });
  }
  currentNodeId = nextId;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function eliminate() {
  const node = getNode(currentNodeId);
  if (node) history.push({ num: node.num, date: node.date, time: node.time, rank: 4 });
  currentNodeId = 'ELIM';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  history = [];
  currentNodeId = TEAMS[currentTeam].start;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectTeam(team) {
  currentTeam = team;
  history = [];
  currentNodeId = TEAMS[team].start;
  document.getElementById('btn-long').classList.toggle('active', team === 'long');
  document.getElementById('btn-guard').classList.toggle('active', team === 'guard');
  render();
}

// ============================================================
//  INIT
// ============================================================
selectTeam('long');

// Floating particles
for (let i = 0; i < 12; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random()*100}%;
    width: ${2 + Math.random()*4}px;
    height: ${2 + Math.random()*4}px;
    animation-duration: ${8 + Math.random()*12}s;
    animation-delay: ${Math.random()*10}s;
    opacity: 0;
  `;
  document.body.appendChild(p);
}
</script>
</body>
</html>
